[grammar]
extensions=.cpp .cxx .cc .c++ .hpp .hxx .hh .h++ .ii .i
display-name=C++ Program

[colors]
comment = brown;
delimiter = brightcyan;
delimiter.special = brightmagenta;
function.special = brightred;
keyword = yellow;
label = cyan;
operator.word = yellow;
string = green;
string.special = brightgreen;
type = yellow;
