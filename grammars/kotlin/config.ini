[grammar]
extensions=.kt .kts
display-name=Kotlin Program

[colors]
comment = brown;
delimiter = brightcyan;
function.builtin = brown;
keyword = yellow;
keyword.control = brightmagenta;
label = cyan;
operator = brightcyan;
string = green;
string.special = brightgreen;
type.builtin = brightgreen;
variable.builtin = brightred;
