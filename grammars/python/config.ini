[grammar]
extensions=.py .pyw .pyi
shebangs=python python3
display-name=Python Program

[colors]
comment = brown;
constant = lightgray;
delimiter = brightcyan;
delimiter.special = brightmagenta;
function.special = brightred;
keyword = yellow;
operator.word = yellow;
string = green;
string.special = brightgreen;
variable.builtin = brightred;
