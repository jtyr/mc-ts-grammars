[grammar]
extensions=.f90 .f95 .f03 .f08 .f .for .fpp .ftn
display-name=Fortran Program

[colors]
comment = brown
constant.builtin = brightmagenta
delimiter = brightcyan
function.special = brightred
keyword = yellow
number.builtin = brightgreen
operator.word = yellow
property = brightcyan
string = green
