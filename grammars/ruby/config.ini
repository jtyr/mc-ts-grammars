[grammar]
extensions=.rb .rake .gemspec
filenames=Vagrantfile Gemfile Rakefile
shebangs=ruby
display-name=Ruby Program

[colors]
comment = brown
delimiter = brightcyan
function.special = brightred
keyword.directive = magenta
keyword.other = white
operator.word = yellow
string = green
string.special = brightgreen
variable.special = brightgreen
