[grammar]
extensions=.glsl .vert .frag .geom .tesc .tese .comp
display-name=GLSL Shader

[colors]
comment = brown
delimiter = brightcyan
delimiter.special = brightmagenta
function.macro = brightmagenta
function.special = brightred
keyword = yellow
keyword.other = white
string = green
string.special = brightgreen
type = yellow
