[grammar]
extensions=.tmpl .tpl .gotmpl .gohtml .gotxt
display-name=Go Template
wrapper=text yaml json toml html xml markdown css

[colors]
comment = brown;
constant.builtin = brightmagenta;
delimiter = brightcyan;
function = brightcyan;
function.builtin = yellow;
keyword = yellow;
number = lightgray;
operator = brightcyan;
property = white;
string = green;
string.special = brightgreen;
variable.builtin = brightred;
