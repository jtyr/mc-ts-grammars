[grammar]
extensions=.sh .bash .bats
filenames=.bashrc .bash_profile .profile PKGBUILD
shebangs=bash sh bats
display-name=Shell Script

[colors]
comment = brown
comment.shebang = brightcyan
delimiter = brightcyan
function = cyan
function.definition = brightmagenta
function.security = red
keyword = yellow
keyword.function = brightmagenta
operator = brightcyan
punctuation.backtick = brightred
punctuation.special = brightred
string = green
string.special = brightgreen
variable.builtin = brightred
variable.positional = brightred
variable.special = brightgreen
