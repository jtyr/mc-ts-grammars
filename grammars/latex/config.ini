[grammar]
extensions=.tex .ltx .sty .cls
display-name=LaTeX

[colors]
comment = brown;
constant = lightgray;
function = brightcyan;
function.macro = brightmagenta;
keyword.conditional = yellow;
keyword.directive = magenta;
keyword.import = yellow;
label = cyan;
markup.heading = brightmagenta;
markup.heading. = brightmagenta;
markup.italic = magenta;
markup.link = yellow;
markup.link.url = yellow;
markup.math = brightgreen;
markup.strong = brightmagenta;
module = brightcyan;
nospell = lightgray;
operator = brightcyan;
punctuation.bracket = brightcyan;
punctuation.delimiter = brightcyan;
punctuation.special = brightmagenta;
spell = lightgray;
string = green;
string.regexp = brightmagenta;
string.special.path = green;
variable = lightgray;
variable.parameter = lightgray;
