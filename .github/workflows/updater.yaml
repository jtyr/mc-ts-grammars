name: Update Grammars

on:
  schedule:
    # Every Saturday at 06:00 UTC
    - cron: 0 6 * * 6
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check for upstream updates
        id: check
        uses: ./.github/actions/check-updates

      - name: Fetch updated grammar sources
        if: steps.check.outputs.hasUpdates == 'true'
        uses: ./.github/actions/fetch-grammar
        with:
          languages: ${{ steps.check.outputs.updated }}

      - name: Create pull request
        id: create-pr
        if: steps.check.outputs.hasUpdates == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Update grammars: ${{ steps.check.outputs.updated }}"
          title: "Update grammars: ${{ steps.check.outputs.updated }}"
          body: |
            Automated grammar update.

            Updated grammars: ${{ steps.check.outputs.updated }}
          branch: auto-update-grammars
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --squash --auto --delete-branch
