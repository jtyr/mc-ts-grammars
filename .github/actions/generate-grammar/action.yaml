name: Generate Grammar
description: Generate parser.c from grammar.js using tree-sitter CLI

inputs:
  languages:
    description: Space-separated list of language names to generate (or "all")
    required: true
  cacheParsers:
    description: Cache generated parser.c files between runs
    required: false
    default: "false"
  cacheKeyPrefix:
    description: Prefix for the parser cache key (e.g. "pr-123" or "release")
    required: false
    default: default
  clean:
    description: Run generate.sh with --clean (isolated npm cache, forces fresh install per grammar)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "24"

    - name: Cache npm packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.npm
        key: npm-${{ hashFiles('grammars/*/src/package.json') }}
        restore-keys: |
          npm-

    - name: Install tree-sitter CLI
      shell: bash
      run: $GITHUB_ACTION_PATH/scripts/install-tree-sitter-cli.sh

    - name: Restore parser cache
      if: inputs.cacheParsers == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: .parser-cache
        key: parsers-${{ inputs.cacheKeyPrefix }}-${{ hashFiles('grammars/*/src/grammar.js', 'grammars/*/src/src/scanner.c', 'grammars/*/src/src/scanner.cc', 'grammars/*/src/package.json') }}
        restore-keys: |
          parsers-${{ inputs.cacheKeyPrefix }}-

    - name: Generate parsers
      shell: bash
      run: |
        args=""
        if [ "${{ inputs.languages }}" = "all" ]; then
          args="--all"
        else
          args="${{ inputs.languages }}"
        fi
        if [ "${{ inputs.cacheParsers }}" = "true" ]; then
          args="--cache-dir=.parser-cache $args"
        fi
        if [ "${{ inputs.clean }}" = "true" ]; then
          args="--clean $args"
        fi
        $GITHUB_ACTION_PATH/scripts/generate.sh $args
